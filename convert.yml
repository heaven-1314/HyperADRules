name: Convert to Clash Domain Format

on:
  schedule:
    - cron: "0 2 * * *"        # Daily at 02:00 UTC
  workflow_dispatch:            # Manual trigger from Actions tab
  push:
    paths:
      - "rules.txt"
      - "dns.txt"
      - "allow.txt"             # Trigger on rule updates

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # Needed to push converted files back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Convert ABP rules to Clash domain format
        run: python3 convert_to_clash.py

      - name: Show output stats
        run: |
          echo "=== Generated files ==="
          ls -lh clash-*.txt 2>/dev/null || echo "(no output files)"
          echo ""
          for f in clash-domains.txt clash-dns-domains.txt clash-combined.txt; do
            if [ -f "$f" ]; then
              echo "--- $f (first 5 lines) ---"
              head -8 "$f"
              echo ""
            fi
          done

      - name: Commit & push converted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all clash output files
          git add clash-domains.txt clash-dns-domains.txt clash-combined.txt

          if git diff --staged --quiet; then
            echo "No changes — rules are up to date."
          else
            git commit -m "chore: update clash domain rules [skip ci]"
            git push
            echo "Pushed updated rules."
          fi
